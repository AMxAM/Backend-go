services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 231298
      POSTGRES_DB: users_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      target: final

    container_name: go_api

    ports:
      - "8080:8080"

    environment:
      HTTP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 231298
      DB_NAME: users_db
      DB_SSLMODE: disable
      JWT_SECRET: mi-secreto
      JWT_EXPIRE_HOURS: 24

    depends_on:
      - db

volumes:
  postgres_data: